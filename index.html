<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Sangam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Marathi&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">
            हॉटेल संगम
        </div>
        <nav>
            <ul>
                <li><a href="#">HOME</a></li>
                <li><a href="#">ABOUT</a></li>
                <li><a href="menu.html">MENU</a></li>
                <li><a href="#">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="slogan-section">
            <img src="images/slogan.png" alt="चवीचा शोध इथेच थांबतो">
        </div>

        <div class="slider">
            <img src="images/mainimg.png" class="slide active" alt="Main Image">
            <img src="images/vegthali.png" class="slide" alt="Veg Thali">
        </div>

        <div class="left">
            <h1>
                BEST QUALITY <br>
                FOOD
            </h1>
            <p>
                Experience the perfect blend of taste and tradition.
                Authentic Maharashtrian food made with premium ingredients
                and rich flavors.
            </p>
            <a href="menu.html">
                <button>MENU</button>
            </a>
        </div>
    </section>

    <script>
        let slides = document.querySelectorAll('.slide');
        let index = 0;

        setInterval(() => {
            slides[index].classList.remove('active');
            index++;
            if (index >= slides.length) {
                index = 0;
            }
            slides[index].classList.add('active');
        }, 4000);
    </script>
</body>

</html>
